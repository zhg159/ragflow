name: Build ARM64 Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # ARM runner
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: |
          pip install nltk huggingface-hub
          python download_deps.py

      - name: Build deps image
        run: |
          docker build -f Dockerfile.deps -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-deps:arm64 .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-deps:arm64

      - name: Build main image
        run: |
          docker build -f Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64 .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64

      - name: Export image
        run: |
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64 | gzip > ragflow-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ragflow-arm64-image
          path: ragflow-arm64.tar.gz
          retention-days: 7
